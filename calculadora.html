<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimizador Estilo Fusion</title>
    <style>
        :root { --dorado: #b08d57; --negro: #1a1a1a; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 10px; padding-bottom: 100px; }
        nav { background: var(--negro); padding: 15px; text-align: center; color: var(--dorado); font-weight: bold; border-bottom: 3px solid var(--dorado); margin: -10px -10px 15px -10px; text-transform: uppercase; }
        .tabs { display: flex; gap: 4px; margin-bottom: 10px; overflow-x: auto; }
        .tab { flex: none; padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 10px; background: #ccc; text-transform: uppercase; }
        .tab.active { background: var(--dorado); color: white; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; display: none; }
        .card.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 9px; font-weight: bold; color: #666; margin-bottom: 2px; text-transform: uppercase; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
        .section-title { font-size: 11px; color: var(--dorado); font-weight: bold; margin: 15px 0 5px 0; border-bottom: 1px solid #eee; }
        .btn-add { width: 100%; padding: 15px; background: var(--negro); color: var(--dorado); border: 2px solid var(--dorado); border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .lista-item { background: white; border-left: 5px solid var(--dorado); padding: 12px; margin-bottom: 8px; border-radius: 10px; position: relative; font-size: 12px; }
        .btn-del { position: absolute; right: 10px; top: 10px; background: #ff4444; color: white; border: none; padding: 4px 8px; border-radius: 5px; font-size: 10px; }
        .resumen-total { background: var(--negro); color: white; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .shop-list { background: #222; border: 1px solid var(--dorado); padding: 10px; border-radius: 8px; margin-top: 10px; }
        .total-lps { font-size: 26px; color: var(--dorado); text-align: center; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<nav>Estilo Fusion - Ingeniería y Optimización</nav>

<div class="tabs">
    <button class="tab active" onclick="openTab(event, 'cotizar')">Proyectos</button>
    <button class="tab" onclick="openTab(event, 'inventario')">Base de Datos</button>
</div>

<div id="cotizar" class="card active">
    <div class="grid">
        <div class="full"><label>Descripción (Ej: Verja Frontal)</label><input type="text" id="ofi_desc"></div>
        <div><label>Ancho (pulg)</label><input type="number" id="ofi_ancho" value="48"></div>
        <div><label>Alto (pulg)</label><input type="number" id="ofi_alto" value="48"></div>
        <div class="full"><label>Perfil para Marco</label><select id="sel_marco_m"></select></div>
        <div><label>Grosor Marco (pulg)</label><input type="number" id="m_gr" value="1.5"></div>
        <div><label>Sep. Deseada (pulg)</label><input type="number" id="m_sep" value="5"></div>
        <div class="full"><label>Perfil para Barrotes</label><select id="sel_barro_m"></select></div>
    </div>
    
    <div class="grid" style="margin-top:10px;">
        <div><label>Mano de Obra (Lps)</label><input type="number" id="fin_mo" value="0"></div>
        <div><label>Ganancia (%)</label><input type="number" id="fin_gan" value="30"></div>
    </div>
    <button class="btn-add" onclick="calcularYAgregar()">+ Añadir al Proyecto</button>
</div>

<div id="inventario" class="card">
    <div class="grid">
        <div class="full"><label>Nombre Material</label><input type="text" id="db_n"></div>
        <div><label>Precio Lps</label><input type="number" id="db_p"></div>
        <div><label>Unidad</label>
            <select id="db_u">
                <option value="20">Tira 20ft</option>
                <option value="30">Varilla 30ft</option>
            </select>
        </div>
    </div>
    <button onclick="guardarDB()" style="width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:8px; margin-top:10px; font-weight:bold;">Guardar Material</button>
    <hr><div id="db_lista"></div>
</div>

<div id="lista_proyecto"></div>

<div id="res_final" class="resumen-total" style="display:none;">
    <h3>📊 BALANCE Y LISTA DE COMPRA</h3>
    <div id="res_det"></div>
    <div class="shop-list">
        <label style="color:var(--dorado)">🛒 Materiales Exactos a Comprar:</label>
        <div id="res_compras"></div>
    </div>
    <div class="total-lps" id="res_total"></div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('fusion_db')) || [];
let carrito = [];

function openTab(e, n) {
    document.querySelectorAll('.card').forEach(x => x.style.display = 'none');
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.getElementById(n).style.display = 'block'; e.currentTarget.classList.add('active');
}

function guardarDB() {
    const n = document.getElementById('db_n').value, p = parseFloat(document.getElementById('db_p').value), u = document.getElementById('db_u').value;
    if(!n || isNaN(p)) return;
    db.push({ id: Date.now(), n, p, u: parseInt(u) });
    localStorage.setItem('fusion_db', JSON.stringify(db));
    actualizarSelects();
}

function actualizarSelects() {
    const selects = ['sel_marco_m','sel_barro_m'];
    selects.forEach(sId => {
        const s = document.getElementById(sId); s.innerHTML = '<option value="">Seleccione...</option>';
        db.forEach(m => s.innerHTML += `<option value="${m.id}">${m.n}</option>`);
    });
    const l = document.getElementById('db_lista'); l.innerHTML = "";
    db.forEach((m, i) => l.innerHTML += `<div class="lista-item">${m.n} <button class="btn-del" onclick="db.splice(${i},1);localStorage.setItem('fusion_db',JSON.stringify(db));actualizarSelects();">X</button></div>`);
}

function calcularYAgregar() {
    const m = db.find(x => x.id == document.getElementById('sel_marco_m').value);
    const b = db.find(x => x.id == document.getElementById('sel_barro_m').value);
    const a = parseFloat(document.getElementById('ofi_ancho').value);
    const h = parseFloat(document.getElementById('ofi_alto').value);
    const gr = parseFloat(document.getElementById('m_gr').value);
    const sep = parseFloat(document.getElementById('m_sep').value);

    const nEsp = Math.round(a/sep);
    const cantB = nEsp-1;
    const hB = h-(gr*2);
    
    // Guardamos longitudes puras para optimizar al final
    carrito.push({
        desc: document.getElementById('ofi_desc').value || "Pieza",
        mo: parseFloat(document.getElementById('fin_mo').value) || 0,
        ganP: parseFloat(document.getElementById('fin_gan').value)/100,
        materiales: [
            { id: m.id, nombre: m.n, pies: ((a*2)+(h*2))/12, precio: m.p, unidad: m.u },
            { id: b.id, nombre: b.n, pies: (hB*cantB)/12, precio: b.p, unidad: b.u }
        ],
        info: `${cantB} barrotes de ${hB.toFixed(1)}"`
    });
    render();
}

function render() {
    const l = document.getElementById('lista_proyecto'); l.innerHTML = "";
    const compCont = document.getElementById('res_compras'); compCont.innerHTML = "";
    let granTotalMat = 0, granTotalMO = 0, granTotalGan = 0;
    
    let resumenMateriales = {}; // Aquí acumulamos todo por ID de material

    carrito.forEach((p, i) => {
        let costoPieza = 0;
        p.materiales.forEach(mat => {
            if(!resumenMateriales[mat.id]) {
                resumenMateriales[mat.id] = { nombre: mat.nombre, piesTotales: 0, unidad: mat.unidad, precio: mat.precio };
            }
            resumenMateriales[mat.id].piesTotales += mat.pies;
        });
        
        // El costo de cada pieza en la lista es aproximado, el real sale abajo optimizado
        p.materiales.forEach(m => costoPieza += (m.pies/m.unidad)*m.precio);
        const sub = costoPieza + p.mo;
        const gan = sub * p.ganP;
        
        granTotalMO += p.mo;
        granTotalGan += gan;

        l.innerHTML += `<div class="lista-item"><strong>${p.desc}</strong><br><small>${p.info}</small><button class="btn-del" onclick="carrito.splice(${i},1);render();">X</button></div>`;
    });

    // CÁLCULO FINAL OPTIMIZADO
    for (let id in resumenMateriales) {
        const m = resumenMateriales[id];
        const tirasNecesarias = Math.ceil(m.piesTotales / m.unidad);
        const costoFinalMat = tirasNecesarias * m.precio;
        granTotalMat += costoFinalMat;
        
        compCont.innerHTML += `<div style="font-size:12px; margin-bottom:4px;">• ${m.nombre}: <b>${tirasNecesarias} tiras</b> (${m.unidad}ft)</div>`;
    }

    document.getElementById('res_final').style.display = carrito.length > 0 ? 'block' : 'none';
    const finalVenta = granTotalMat + granTotalMO + granTotalGan;
    
    document.getElementById('res_det').innerHTML = `
        <div class="res-line"><span>Total Materiales:</span> <span>L. ${granTotalMat.toLocaleString()}</span></div>
        <div class="res-line"><span>Total Mano de Obra:</span> <span>L. ${granTotalMO.toLocaleString()}</span></div>
        <div class="res-line"><span style="color:var(--dorado)">Utilidad Neta:</span> <span>L. ${granTotalGan.toLocaleString()}</span></div>
    `;
    document.getElementById('res_total').innerText = "VENTA TOTAL: L. " + finalVenta.toLocaleString();
}

actualizarSelects();
</script>
</body>
</html>
