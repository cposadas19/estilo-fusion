<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FyC Solution PRO</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:15px; }
.card { background:#1e293b; padding:12px; border-radius:10px; margin-top:10px; }
input, select { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none; }
button { width:100%; padding:12px; margin-top:5px; background:#22c55e; color:black; font-weight:bold; border:none; border-radius:8px; }
.result { background:#111827; padding:10px; border-radius:8px; margin-top:10px; }
</style>
</head>

<body>

<h2>FyC Solution - Sistema PRO</h2>

<div class="card">
<h3>Proyecto</h3>
<input id="nombreProyecto" placeholder="Nombre del proyecto">
</div>

<div class="card">
<h3>Verja</h3>
<input id="ancho" placeholder="Ancho (cm)">
<input id="alto" placeholder="Alto (cm)">
<input id="sep" placeholder="Separación barrotes (cm)">
<input id="tuboMarco" placeholder='Marco ej: 2", 2x1'>

<select id="tipoBarrote">
<option value="varilla">Varilla (30 pies)</option>
<option value="tubo">Tubo (20 pies)</option>
<option value="platina">Platina (20 pies)</option>
</select>

<button onclick="agregar()">➕ Agregar Verja</button>
</div>

<div class="card">
<h3>Precios</h3>
<input id="precioTubo" placeholder="Precio tubo">
<input id="precioBarrote" placeholder="Precio varilla/tubo">
</div>

<div class="card">
<button onclick="calcular()">📐 Calcular Proyecto</button>
<button onclick="guardar()">💾 Guardar Proyecto</button>
</div>

<div class="card">
<h3>Resultado</h3>
<div id="res" class="result"></div>
</div>

<div class="card">
<h3>Proyectos guardados</h3>
<div id="lista"></div>
</div>

<script>

let proyecto=[];

function extraer(t){
t=t.toLowerCase();
if(t.includes("/")){
let m=t.match(/(\d+)\/(\d+)/);
return m?m[1]/m[2]:1;
}
if(t.includes("x")){
let p=t.split("x");
return Math.max(parseFloat(p[0]),parseFloat(p[1]));
}
let n=t.match(/[\d.]+/);
return n?parseFloat(n[0]):1;
}

function agregar(){

let ancho=parseFloat(ancho.value);
let alto=parseFloat(alto.value);
let sep=parseFloat(sep.value);
let tipo=tipoBarrote.value;
let tuboTexto=tuboMarco.value;

let pulg=extraer(tuboTexto);
let tubo=pulg*2.54;

let espacios=Math.floor(ancho/sep);
if(espacios<1) espacios=1;

let barrotes=espacios+1;
let altoBarrote=alto-(tubo*2);

let marco=[ancho,ancho,alto,alto];
let barrotesArr=[];

for(let i=0;i<barrotes;i++){
barrotesArr.push(altoBarrote);
}

proyecto.push({marco,barrotes:barrotesArr,tipo});

alert("Verja agregada");
}

function optimizar(piezas,largo){

piezas.sort((a,b)=>b-a);
let tubos=[];

piezas.forEach(c=>{

let colocado=false;

for(let i=0;i<tubos.length;i++){
if(tubos[i]+c<=largo){
tubos[i]+=c;
colocado=true;
break;
}
}

if(!colocado){
tubos.push(c);
}

});

return tubos.length;
}

function calcular(){

let marcoTotal=[];
let barrotesTotal=[];
let tipoBarroteSel="tubo";

proyecto.forEach(v=>{
marcoTotal=marcoTotal.concat(v.marco);
barrotesTotal=barrotesTotal.concat(v.barrotes);
tipoBarroteSel=v.tipo;
});

let tubosMarco=optimizar(marcoTotal,610);

let largo=(tipoBarroteSel==="varilla")?914:610;
let tubosBarrotes=optimizar(barrotesTotal,largo);

let precioTubo=parseFloat(document.getElementById("precioTubo").value)||0;
let precioBarrote=parseFloat(document.getElementById("precioBarrote").value)||0;

let costo=(tubosMarco*precioTubo)+(tubosBarrotes*precioBarrote);

res.innerHTML=`
Verjas: ${proyecto.length}<br><br>

Marco: ${tubosMarco} tubos<br>
Barrotes: ${tubosBarrotes} unidades<br><br>

Costo total: L ${costo}<br><br>

<input placeholder="Precio cobrado" onchange="ganancia(this,${costo})">
<div></div>
`;
}

function ganancia(input,costo){
let precio=parseFloat(input.value);
let g=precio-costo;
input.nextElementSibling.innerHTML="Ganancia: L "+g;
}

function guardar(){

let nombre=nombreProyecto.value;
let data=JSON.parse(localStorage.getItem("proyectos"))||[];

data.push({nombre,proyecto});

localStorage.setItem("proyectos",JSON.stringify(data));

proyecto=[];
mostrar();
}

function mostrar(){

let data=JSON.parse(localStorage.getItem("proyectos"))||[];
let html="";

data.forEach((p,i)=>{
html+=`
<div class="result">
<b>${p.nombre}</b><br>
Verjas: ${p.proyecto.length}<br>

<button onclick="eliminar(${i})">Eliminar</button>
</div>
`;
});

lista.innerHTML=html;
}

function eliminar(i){
let data=JSON.parse(localStorage.getItem("proyectos"));
data.splice(i,1);
localStorage.setItem("proyectos",JSON.stringify(data));
mostrar();
}

mostrar();

</script>

</body>
</html>
