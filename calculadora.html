<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilo Fusion - Ingeniería Pro</title>
    <style>
        :root { --dorado: #b08d57; --negro: #1a1a1a; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 10px; padding-bottom: 100px; }
        nav { background: var(--negro); padding: 15px; text-align: center; color: var(--dorado); font-weight: bold; border-bottom: 3px solid var(--dorado); margin: -10px -10px 15px -10px; text-transform: uppercase; }
        .tabs { display: flex; gap: 4px; margin-bottom: 10px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 10px; background: #ccc; }
        .tab.active { background: var(--dorado); color: white; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; display: none; }
        .card.active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 9px; font-weight: bold; color: #666; margin-bottom: 2px; text-transform: uppercase; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
        .btn-add { width: 100%; padding: 15px; background: var(--negro); color: var(--dorado); border: 2px solid var(--dorado); border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-plus { background: var(--dorado); color: white; border: none; padding: 8px; border-radius: 6px; font-weight: bold; min-width: 45px; }
        .lista-item { background: white; border-left: 5px solid var(--dorado); padding: 12px; margin-bottom: 8px; border-radius: 10px; position: relative; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-del { position: absolute; right: 10px; top: 10px; background: #ff4444; color: white; border: none; padding: 4px 8px; border-radius: 5px; font-size: 10px; }
        .resumen-total { background: var(--negro); color: white; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .total-box { font-size: 26px; color: var(--dorado); text-align: center; font-weight: bold; border-top: 1px solid var(--dorado); padding-top: 10px; margin-top: 10px; }
        .shop-list { background: #222; border: 1px solid var(--dorado); padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 12px; color: #ccc; }
    </style>
</head>
<body>

<nav>Estilo Fusion</nav>

<div class="tabs">
    <button class="tab active" onclick="openTab(event, 'proyectos')">PROYECTOS</button>
    <button class="tab" onclick="openTab(event, 'inventario')">BASE DE DATOS</button>
</div>

<div id="proyectos" class="card active">
    <div class="grid">
        <div class="full"><label>Descripción</label><input type="text" id="p_desc" placeholder="Ej: Verja Sala"></div>
        <div><label>Ancho (pulg)</label><input type="number" id="p_ancho" value="40"></div>
        <div><label>Alto (pulg)</label><input type="number" id="p_alto" value="40"></div>
        <div class="full"><label>Material Marco</label><select id="sel_marco"></select></div>
        <div><label>Grosor Marco (p)</label><input type="number" id="p_grosor" value="1.5"></div>
        <div><label>Largo Perfil (ft)</label><select id="p_unit_m"><option value="20">20 ft</option><option value="30">30 ft</option></select></div>
        <div class="full"><label>Material Barrote</label><select id="sel_barrote"></select></div>
        <div><label>Separación (p)</label><input type="number" id="p_sep" value="5"></div>
        <div><label>Largo Perfil (ft)</label><select id="p_unit_b"><option value="30">30 ft</option><option value="20">20 ft</option></select></div>
        <div class="full" style="background:#f9f9f9; padding:10px; border-radius:8px; border:1px dashed var(--dorado);">
            <label>Carrito de Insumos</label>
            <div style="display:flex; gap:5px;">
                <select id="sel_cons" style="flex:2;"></select>
                <input type="number" id="cons_cant" value="1" style="flex:1;">
                <button class="btn-plus" onclick="sumarConsumible()">+</button>
            </div>
            <div id="lista_badges_cons" style="margin-top:8px;"></div>
        </div>
        <div><label>Mano de Obra (Lps)</label><input type="number" id="p_mo" value="0"></div>
        <div><label>Ganancia (%)</label><input type="number" id="p_gan" value="30"></div>
    </div>
    <button class="btn-add" onclick="agregarAlProyecto()">+ AÑADIR A LA COTIZACIÓN</button>
</div>

<div id="inventario" class="card">
    <div class="grid">
        <div class="full"><label>Nombre Material / Perfil</label><input type="text" id="db_n"></div>
        <div class="full"><label>Precio Lps</label><input type="number" id="db_p"></div>
    </div>
    <button onclick="guardarDB()" style="width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:10px; margin-top:10px; font-weight:bold;">GUARDAR EN LISTA</button>
    <hr><div id="db_lista_visual"></div>
</div>

<div id="lista_proyecto_visual"></div>

<div id="res_final" class="resumen-total" style="display:none;">
    <h3>📊 RESULTADO FINAL</h3>
    <div id="detalle_compras" class="shop-list"></div>
    <div id="res_det_precios"></div>
    <div class="total-box" id="gran_total"></div>
</div>

<script>
let db = JSON.parse(localStorage.getItem('fusion_db')) || [];
let proyecto = [], carritoConsumibles = [];

function openTab(e, n) {
    document.querySelectorAll('.card').forEach(x => x.style.display = 'none');
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.getElementById(n).style.display = 'block'; e.currentTarget.classList.add('active');
}

function guardarDB() {
    const n = document.getElementById('db_n').value, p = parseFloat(document.getElementById('db_p').value);
    if(!n || isNaN(p)) return;
    db.push({ id: Date.now(), n, p });
    localStorage.setItem('fusion_db', JSON.stringify(db));
    document.getElementById('db_n').value = ""; document.getElementById('db_p').value = "";
    actualizarSelects();
}

function actualizarSelects() {
    const ids = ['sel_marco', 'sel_barrote', 'sel_cons'];
    ids.forEach(id => {
        const s = document.getElementById(id); s.innerHTML = '<option value="">--Seleccionar--</option>';
        db.forEach(m => s.innerHTML += `<option value="${m.id}">${m.n}</option>`);
    });
    const l = document.getElementById('db_lista_visual'); l.innerHTML = "";
    db.forEach((m, i) => l.innerHTML += `<div class="lista-item">${m.n} (L.${m.p}) <button class="btn-del" onclick="db.splice(${i},1);localStorage.setItem('fusion_db',JSON.stringify(db));actualizarSelects();">X</button></div>`);
}

function sumarConsumible() {
    const id = document.getElementById('sel_cons').value;
    const m = db.find(x => x.id == id);
    if(m) { carritoConsumibles.push({ ...m, c: parseFloat(document.getElementById('cons_cant').value)||1 }); renderBadges(); }
}

function renderBadges() {
    const c = document.getElementById('lista_badges_cons'); c.innerHTML = "";
    carritoConsumibles.forEach((x, i) => c.innerHTML += `<span style="background:#333; color:var(--dorado); padding:4px 8px; border-radius:4px; margin-right:4px; font-size:10px;">${x.c}x ${x.n}</span>`);
}

function agregarAlProyecto() {
    const idM = document.getElementById('sel_marco').value, idB = document.getElementById('sel_barrote').value;
    const m = db.find(x => x.id == idM), b = db.find(x => x.id == idB);
    const a = parseFloat(document.getElementById('p_ancho').value), h = parseFloat(document.getElementById('p_alto').value);
    const gr = parseFloat(document.getElementById('p_grosor').value), sep = parseFloat(document.getElementById('p_sep').value);
    const mo = parseFloat(document.getElementById('p_mo').value), gan = parseFloat(document.getElementById('p_gan').value);
    
    if(!m) return alert("Selecciona material del marco");

    const nEsp = Math.round(a/sep), cantB = nEsp-1, corteB = h-(gr*2);
    
    proyecto.push({
        desc: document.getElementById('p_desc').value || "Pieza",
        mo, gan,
        mats: [
            { id: m.id, n: m.n, p: m.p, u: parseInt(document.getElementById('p_unit_m').value), pies: ((a*2)+(h*2))/12 },
            { id: b?b.id:null, n: b?b.n:'', p: b?b.p:0, u: parseInt(document.getElementById('p_unit_b').value), pies: b?(corteB*cantB)/12:0 }
        ],
        cons: [...carritoConsumibles],
        info: `${cantB} barrotes de ${corteB.toFixed(2)}"`
    });
    carritoConsumibles = []; renderBadges(); renderProyecto();
}

function renderProyecto() {
    const l = document.getElementById('lista_proyecto_visual'); l.innerHTML = "";
    let matRes = {}, totalMO = 0, totalCons = 0, totalMatLps = 0, totalGan = 0;

    proyecto.forEach((p, i) => {
        totalMO += p.mo;
        p.mats.forEach(m => {
            if(m.id) {
                if(!matRes[m.id]) matRes[m.id] = { n: m.n, p: m.p, u: m.u, pies: 0 };
                matRes[m.id].pies += m.pies;
            }
        });
        p.cons.forEach(c => totalCons += (c.p * c.c));
        l.innerHTML += `<div class="lista-item"><strong>${p.desc}</strong><br><small>${p.info}</small><button class="btn-del" onclick="proyecto.splice(${i},1);renderProyecto();">X</button></div>`;
    });

    let htmlComp = "🛒 <b>Compra de Perfiles:</b><br>";
    for (let id in matRes) {
        const m = matRes[id];
        const perfiles = Math.ceil(m.pies / m.u);
        totalMatLps += (perfiles * m.p);
        htmlComp += `• ${m.n}: ${perfiles} perfiles (${m.u}ft)<br>`;
    }

    const subtotal = totalMatLps + totalCons + totalMO;
    // Cálculo promedio de ganancia
    let promGan = 0;
    proyecto.forEach(p => promGan += p.gan);
    totalGan = subtotal * ((promGan/proyecto.length)/100);
    
    document.getElementById('res_final').style.display = proyecto.length > 0 ? 'block' : 'none';
    document.getElementById('detalle_compras').innerHTML = htmlComp;
    document.getElementById('res_det_precios').innerHTML = `
        <div style="display:flex; justify-content:space-between; font-size:13px;"><span>Costo Perfiles:</span><span>L. ${totalMatLps.toLocaleString()}</span></div>
        <div style="display:flex; justify-content:space-between; font-size:13px;"><span>Costo Insumos:</span><span>L. ${totalCons.toLocaleString()}</span></div>
        <div style="display:flex; justify-content:space-between; font-size:13px;"><span>Mano de Obra:</span><span>L. ${totalMO.toLocaleString()}</span></div>
        <div style="display:flex; justify-content:space-between; font-size:13px; color:var(--dorado); font-weight:bold; margin-top:5px;"><span>Utilidad Deseada:</span><span>L. ${totalGan.toLocaleString()}</span></div>
    `;
    document.getElementById('gran_total').innerText = "TOTAL VENTA: L. " + (subtotal + totalGan).toLocaleString();
}
actualizarSelects();
</script>
</body>
</html>
