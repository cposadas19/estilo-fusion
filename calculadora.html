<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FyC Solution - Calculadora Pro</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:15px; }
.card { background:#1e293b; padding:12px; border-radius:10px; margin-top:10px; }
input, select { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none; }
button { width:100%; padding:12px; background:#22c55e; color:black; font-weight:bold; border:none; border-radius:8px; }
</style>
</head>

<body>

<h2>FyC Solution - Estilo Fusión</h2>

<div class="card">
<h3>Medidas</h3>
<input id="ancho" placeholder="Ancho (cm)">
<input id="alto" placeholder="Alto (cm)">
<input id="sep" placeholder="Separación barrotes (cm)">
</div>

<div class="card">
<h3>Marco (Tubo)</h3>
<input id="tuboNombre" placeholder="Ej: tubo 2x1">
<input id="tuboPrecio" placeholder="Precio barra 6m">
</div>

<div class="card">
<h3>Barrotes</h3>

<select id="tipoBarrote">
<option value="varilla">Varilla</option>
<option value="tubo">Tubo</option>
<option value="platina">Platina</option>
</select>

<input id="barroteNombre" placeholder="Ej: varilla 1/2 o tubo 3/4">
<input id="barrotePrecio" placeholder="Precio unidad">

</div>

<div class="card">
<label>Producción diaria</label>
<input id="produccion" value="3">
</div>

<div class="card">
<button onclick="calcular()">Calcular</button>
</div>

<div class="card">
<h3>Resultado</h3>
<p id="res"></p>
</div>

<script>

function calcular(){

let ancho = parseFloat(ancho.value);
let alto = parseFloat(alto.value);
let sep = parseFloat(sep.value);

let tuboPrecio = parseFloat(tuboPrecio.value);
let barrotePrecio = parseFloat(barrotePrecio.value);
let tipoBarrote = tipoBarrote.value;
let produccion = parseFloat(produccion.value);

// BARROTES
let espacios = Math.floor(ancho / sep);
let barrotes = espacios + 1;
let altoBarrote = alto - 10;

// MARCO (6m)
let tuboTotal = (2*ancho + 2*alto)/600;
let tubos = Math.ceil(tuboTotal);

// BARROTES MATERIAL
let largoTotal = (barrotes * altoBarrote);

// VARILLA (9.14m)
let unidadesBarrote;

if(tipoBarrote == "varilla"){
unidadesBarrote = Math.ceil(largoTotal / 914);
}else{
unidadesBarrote = Math.ceil(largoTotal / 600);
}

// COSTOS
let costoTubo = tubos * tuboPrecio;
let costoBarrote = unidadesBarrote * barrotePrecio;

let material = costoTubo + costoBarrote;

// MANO DE OBRA
let mano = 1200 / produccion;

// TOTAL
let costo = material + mano;

// PRECIOS
let precioPro = costo * 1.7;
let precioRapido = material * 2.5;

// MOSTRAR
res.innerHTML = `
Barrotes: ${barrotes}<br>
Altura barrote: ${altoBarrote} cm<br><br>

Tubos necesarios: ${tubos}<br>
Barrotes unidades: ${unidadesBarrote}<br><br>

Material: L ${material}<br>
Mano de obra: L ${mano.toFixed(0)}<br>
Costo total: L ${costo.toFixed(0)}<br><br>

Precio PRO: L ${precioPro.toFixed(0)}<br>
Precio rápido: L ${precioRapido.toFixed(0)}
`;

}

</script>

</body>
</html>
