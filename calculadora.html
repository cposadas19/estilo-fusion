<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FyC Solution</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:15px; }
.card { background:#1e293b; padding:12px; border-radius:10px; margin-top:10px; }
input, select { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:none; }
button { width:100%; padding:12px; margin-top:5px; background:#22c55e; color:black; font-weight:bold; border:none; border-radius:8px; }
.result { background:#111827; padding:10px; border-radius:8px; margin-top:10px; }
</style>
</head>

<body>

<h2>FyC Solution - Calculadora PRO</h2>

<div class="card">
<input id="ancho" placeholder="Ancho (cm)">
<input id="alto" placeholder="Alto (cm)">
<input id="sep" placeholder="Separación deseada (cm)">
<input id="tuboMarco" placeholder='Marco ej: 2" o 2x1'>

<select id="tipoBarrote">
<option value="varilla">Varilla (30 pies)</option>
<option value="tubo">Tubo (20 pies)</option>
<option value="platina">Platina (20 pies)</option>
</select>

<button onclick="agregar()">Agregar Verja</button>
<button onclick="calcular()">Calcular Proyecto</button>
</div>

<div class="card">
<div id="res"></div>
</div>

<script>

let proyecto = [];

// detectar pulgadas
function extraer(t){
t = t.toLowerCase();

if(t.includes("/")){
let m = t.match(/(\d+)\/(\d+)/);
return m ? m[1]/m[2] : 1;
}

if(t.includes("x")){
let p = t.split("x");
return Math.max(parseFloat(p[0]), parseFloat(p[1]));
}

let n = t.match(/[\d.]+/);
return n ? parseFloat(n[0]) : 1;
}

// agregar verja
function agregar(){

let ancho = parseFloat(document.getElementById("ancho").value);
let alto = parseFloat(document.getElementById("alto").value);
let sep = parseFloat(document.getElementById("sep").value);
let tipo = document.getElementById("tipoBarrote").value;
let tuboTexto = document.getElementById("tuboMarco").value;

if(!ancho || !alto || !sep || !tuboTexto){
alert("Faltan datos");
return;
}

// tubo en cm
let pulg = extraer(tuboTexto);
let tubo = pulg * 2.54;

// cálculo real
let espacios = Math.floor(ancho / sep);
if(espacios < 1) espacios = 1;

let barrotes = espacios + 1;
let separacionReal = ancho / espacios;
let altoBarrote = alto - (tubo * 2);

// piezas
let marco = [ancho, ancho, alto, alto];
let barrotesArr = [];

for(let i=0;i<barrotes;i++){
barrotesArr.push(altoBarrote);
}

proyecto.push({
marco,
barrotes:barrotesArr,
tipo,
info:{
barrotes,
separacionReal,
altoBarrote
}
});

alert("Verja agregada");
}

// optimización tipo Tetris
function optimizar(piezas, largo){

piezas.sort((a,b)=>b-a);
let barras = [];

piezas.forEach(p=>{

let colocado = false;

for(let i=0;i<barras.length;i++){
if(barras[i] + p <= largo){
barras[i] += p;
colocado = true;
break;
}
}

if(!colocado){
barras.push(p);
}

});

return barras.length;
}

// calcular proyecto
function calcular(){

if(proyecto.length === 0){
alert("Agregá al menos una verja");
return;
}

let marcoTotal=[];
let barrotesTotal=[];
let tipo="tubo";

// detalle por verja
let detalle="";

proyecto.forEach((v,i)=>{

marcoTotal = marcoTotal.concat(v.marco);
barrotesTotal = barrotesTotal.concat(v.barrotes);
tipo = v.tipo;

detalle += `
<hr>
Verja ${i+1}<br>
Barrotes: ${v.info.barrotes}<br>
Separación real: ${v.info.separacionReal.toFixed(1)} cm<br>
Altura barrote: ${v.info.altoBarrote.toFixed(1)} cm<br>
`;
});

// optimizar
let tubosMarco = optimizar(marcoTotal, 610);
let largo = (tipo === "varilla") ? 914 : 610;
let tubosBarrotes = optimizar(barrotesTotal, largo);

// resultado
document.getElementById("res").innerHTML = `
${detalle}

<hr>

TOTAL PROYECTO<br><br>

Marco: ${tubosMarco} tubos<br>
Barrotes: ${tubosBarrotes} barras<br><br>

TOTAL MATERIAL: ${tubosMarco + tubosBarrotes}
`;

}

</script>

</body>
</html>
