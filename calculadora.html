<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingeniería Estilo Fusion</title>
    <style>
        :root { --dorado: #b08d57; --negro: #1a1a1a; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 10px; padding-bottom: 100px; }
        nav { background: var(--negro); padding: 15px; text-align: center; color: var(--dorado); font-weight: bold; border-bottom: 3px solid var(--dorado); margin: -10px -10px 15px -10px; text-transform: uppercase; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 10px; overflow-x: auto; }
        .tab { flex: none; padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 10px; background: #ccc; text-transform: uppercase; }
        .tab.active { background: var(--dorado); color: white; }

        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; display: none; }
        .card.active { display: block; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .full { grid-column: span 2; }
        label { display: block; font-size: 9px; font-weight: bold; color: #666; margin-bottom: 2px; text-transform: uppercase; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
        
        .section-title { font-size: 11px; color: var(--dorado); font-weight: bold; margin: 15px 0 5px 0; border-bottom: 1px solid #eee; }
        .btn-add { width: 100%; padding: 15px; background: var(--negro); color: var(--dorado); border: 2px solid var(--dorado); border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer; }

        .lista-item { background: white; border-left: 5px solid var(--dorado); padding: 12px; margin-bottom: 8px; border-radius: 10px; position: relative; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-del { position: absolute; right: 10px; top: 10px; background: #ff4444; color: white; border: none; padding: 4px 8px; border-radius: 5px; font-size: 10px; }

        .resumen-total { background: var(--negro); color: white; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .res-line { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 6px 0; font-size: 13px; }
        .total-lps { font-size: 26px; color: var(--dorado); text-align: center; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<nav>Estilo Fusion - Control de Obra</nav>

<div class="tabs">
    <button class="tab active" onclick="openTab(event, 'cotizar')">Proyectos</button>
    <button class="tab" onclick="openTab(event, 'inventario')">Base de Datos</button>
</div>

<div id="cotizar" class="card active">
    <label>¿Qué estás fabricando?</label>
    <select id="ofi_tipo" onchange="toggleForm()">
        <option value="metal">Estructura / Verja Metal</option>
        <option value="porton">Portón con Lámina</option>
        <option value="pvc">Ventana PVC (Fija/Corrediza/Malla)</option>
        <option value="mueble">Mueble (Melamina/Pino)</option>
        <option value="elec">Instalación Eléctrica</option>
    </select>

    <div class="grid" style="margin-top:10px;">
        <div class="full"><label>Descripción</label><input type="text" id="ofi_desc" placeholder="Ej: Portón Principal"></div>
        <div><label id="lbl_a">Ancho Total (p)</label><input type="number" id="ofi_ancho" value="48"></div>
        <div><label id="lbl_h">Alto Total (p)</label><input type="number" id="ofi_alto" value="48"></div>
    </div>

    <!-- CAMPOS DINÁMICOS -->
    <div id="form_metal">
        <div class="section-title">Detalles Metal</div>
        <div class="grid">
            <div class="full"><label>Perfil Marco</label><select id="sel_marco_m"></select></div>
            <div><label>Grosor Marco (p)</label><input type="number" id="m_gr" value="1.5"></div>
            <div><label>Sep. Barrotes (p)</label><input type="number" id="m_sep" value="5"></div>
            <div class="full"><label>Perfil Barrote</label><select id="sel_barro_m"></select></div>
        </div>
    </div>

    <div id="form_porton" style="display:none;">
        <div class="section-title">Detalles Portón</div>
        <div class="grid">
            <div class="full"><label>Perfil Marco</label><select id="sel_marco_p"></select></div>
            <div class="full"><label>Lámina de Metal</label><select id="sel_lam_p"></select></div>
            <div><label>Ancho Lámina (p)</label><input type="number" id="p_lam_a" value="48"></div>
            <div><label>Alto Lámina (p)</label><input type="number" id="p_lam_h" value="96"></div>
        </div>
    </div>

    <div id="form_pvc" style="display:none;">
        <div class="section-title">Detalles PVC</div>
        <div class="grid">
            <div class="full"><label>Tipo de Ventana</label>
                <select id="pvc_estilo">
                    <option value="fija">Fija</option>
                    <option value="corr">Corrediza (2 Hojas)</option>
                </select>
            </div>
            <div><label>Marco Ventana (p)</label><input type="number" id="pvc_m_v" value="1.5"></div>
            <div><label>Marco Hoja (p)</label><input type="number" id="pvc_m_h" value="1.25"></div>
            <div><label>Traslape/Batiente</label><input type="number" id="pvc_tra" value="1.5"></div>
            <div><label>Marco Malla (p)</label><input type="number" id="pvc_m_m" value="1.0"></div>
            <div class="full"><label>Perfil Principal</label><select id="sel_pvc_per"></select></div>
            <div><label>Costo Vidrio (m2)</label><input type="number" id="pvc_v_c" value="450"></div>
            <div><label>Costo Malla (m2)</label><input type="number" id="pvc_m_c" value="120"></div>
        </div>
    </div>

    <div id="form_mueble" style="display:none;">
        <div class="section-title">Detalles Mueble</div>
        <div class="grid">
            <div class="full"><label>Material (Melamina/Pino)</label><select id="sel_mue_m"></select></div>
            <div><label>Ancho Lámina (p)</label><input type="number" id="mue_a" value="48"></div>
            <div><label>Alto Lámina (p)</label><input type="number" id="mue_h" value="96"></div>
        </div>
    </div>

    <div class="section-title">Costos Finales</div>
    <div class="grid">
        <div><label>Mano de Obra (Lps)</label><input type="number" id="fin_mo" value="0"></div>
        <div><label>Ganancia (%)</label><input type="number" id="fin_gan" value="30"></div>
    </div>

    <button class="btn-add" onclick="calcularYAgregar()">+ Añadir al Proyecto</button>
</div>

<div id="inventario" class="card">
    <h2>Base de Datos de Materiales</h2>
    <div class="grid">
        <div class="full"><label>Nombre</label><input type="text" id="db_n"></div>
        <div><label>Precio (Lps)</label><input type="number" id="db_p"></div>
        <div><label>Unidad</label>
            <select id="db_u">
                <option value="20">Tira 20ft</option>
                <option value="30">Varilla 30ft</option>
                <option value="6">Tira 6m (PVC)</option>
                <option value="1">Lámina / Unidad</option>
            </select>
        </div>
    </div>
    <button onclick="guardarDB()" style="width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:8px; margin-top:10px; font-weight:bold;">Guardar Material</button>
    <hr><div id="db_lista"></div>
</div>

<div id="lista_proyecto"></div>
<div id="res_final" class="resumen-total" style="display:none;"><div id="res_det"></div><div class="total-lps" id="res_total"></div></div>

<script>
let db = JSON.parse(localStorage.getItem('fusion_db')) || [];
let carrito = [];

function openTab(e, n) {
    document.querySelectorAll('.card').forEach(x => x.style.display = 'none');
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.getElementById(n).style.display = 'block'; e.currentTarget.classList.add('active');
}

function toggleForm() {
    const t = document.getElementById('ofi_tipo').value;
    document.getElementById('form_metal').style.display = (t === 'metal') ? 'block' : 'none';
    document.getElementById('form_porton').style.display = (t === 'porton') ? 'block' : 'none';
    document.getElementById('form_pvc').style.display = (t === 'pvc') ? 'block' : 'none';
    document.getElementById('form_mueble').style.display = (t === 'mueble') ? 'block' : 'none';
}

function guardarDB() {
    const n = document.getElementById('db_n').value, p = parseFloat(document.getElementById('db_p').value), u = document.getElementById('db_u').value;
    if(!n || isNaN(p)) return;
    db.push({ id: Date.now(), n, p, u });
    localStorage.setItem('fusion_db', JSON.stringify(db));
    actualizarSelects();
}

function actualizarSelects() {
    const selects = ['sel_marco_m','sel_barro_m','sel_marco_p','sel_lam_p','sel_pvc_per','sel_mue_m'];
    selects.forEach(sId => {
        const s = document.getElementById(sId); s.innerHTML = '<option value="">Seleccione...</option>';
        db.forEach(m => s.innerHTML += `<option value="${m.id}">${m.n} (L.${m.p})</option>`);
    });
    const l = document.getElementById('db_lista'); l.innerHTML = "";
    db.forEach((m, i) => l.innerHTML += `<div class="lista-item">${m.n} <button class="btn-del" onclick="db.splice(${i},1);localStorage.setItem('fusion_db',JSON.stringify(db));actualizarSelects();">X</button></div>`);
}

function calcularYAgregar() {
    const tipo = document.getElementById('ofi_tipo').value;
    const a = parseFloat(document.getElementById('ofi_ancho').value);
    const h = parseFloat(document.getElementById('ofi_alto').value);
    const mo = parseFloat(document.getElementById('fin_mo').value);
    const ganP = parseFloat(document.getElementById('fin_gan').value) / 100;
    
    let costoMat = 0, info = "";

    if(tipo === 'metal') {
        const m = db.find(x => x.id == document.getElementById('sel_marco_m').value);
        const b = db.find(x => x.id == document.getElementById('sel_barro_m').value);
        const gr = parseFloat(document.getElementById('m_gr').value), sep = parseFloat(document.getElementById('m_sep').value);
        const nEsp = Math.round(a/sep), cantB = nEsp-1, hB = h-(gr*2);
        costoMat = (Math.ceil(((a*2)+(h*2))/12/20)*m.p) + (Math.ceil((hB*cantB)/12/30)*b.p);
        info = `Verja: ${cantB} barrotes de ${hB.toFixed(1)}"`;
    } else if(tipo === 'porton') {
        const m = db.find(x => x.id == document.getElementById('sel_marco_p').value);
        const l = db.find(x => x.id == document.getElementById('sel_lam_p').value);
        const la = parseFloat(document.getElementById('p_lam_a').value), lh = parseFloat(document.getElementById('p_lam_h').value);
        costoMat = (Math.ceil(((a*2)+(h*2))/12/20)*m.p) + (Math.ceil((a*h)/(la*lh))*l.p);
        info = `Portón: Marco + Láminas`;
    } else if(tipo === 'pvc') {
        const p = db.find(x => x.id == document.getElementById('sel_pvc_per').value);
        const est = document.getElementById('pvc_estilo').value;
        const mv = parseFloat(document.getElementById('pvc_m_v').value), mh = parseFloat(document.getElementById('pvc_m_h').value);
        const tra = parseFloat(document.getElementById('pvc_tra').value), mm = parseFloat(document.getElementById('pvc_m_m').value);
        
        // Ingeniería PVC
        let lineal = (a*2 + h*2); // Marco
        if(est === 'corr') { lineal += (h*2 + a)*2; } // Traslape/Batiente
        lineal += (a*2 + h*2); // Mosquitero
        costoMat = (Math.ceil(lineal/12/0.0833/6)*p.p); // Tiras 6m
        costoMat += ((a*h)/1550) * parseFloat(document.getElementById('pvc_v_c').value); // Vidrio
        costoMat += ((a*h)/1550) * parseFloat(document.getElementById('pvc_m_c').value); // Malla
        info = `PVC ${est}: Vidrio + Malla + Traslape`;
    } else if(tipo === 'mueble') {
        const m = db.find(x => x.id == document.getElementById('sel_mue_m').value);
        const la = parseFloat(document.getElementById('mue_a').value), lh = parseFloat(document.getElementById('mue_h').value);
        costoMat = Math.ceil((a*h)/(la*lh)) * m.p;
        info = `Mueble: Láminas`;
    }

    const inversion = costoMat + mo;
    carrito.push({ desc: document.getElementById('ofi_desc').value, inv: costoMat, mo, gan: inversion * ganP, info });
    render();
}

function render() {
    const l = document.getElementById('lista_proyecto'); l.innerHTML = "";
    let tI = 0, tM = 0, tG = 0;
    carrito.forEach((p, i) => {
        tI += p.inv; tM += p.mo; tG += p.gan;
        l.innerHTML += `<div class="lista-item"><strong>${p.desc}</strong><br><small>${p.info}</small><br>Venta: L. ${(p.inv+p.mo+p.gan).toLocaleString()}<button class="btn-del" onclick="carrito.splice(${i},1);render();">X</button></div>`;
    });
    document.getElementById('res_final').style.display = carrito.length > 0 ? 'block' : 'none';
    document.getElementById('res_det').innerHTML = `<div class="res-line"><span>Materiales:</span> <span>L. ${tI.toLocaleString()}</span></div><div class="res-line"><span>Mano de Obra:</span> <span>L. ${tM.toLocaleString()}</span></div><div class="res-line"><span style="color:var(--dorado)">Ganancia:</span> <span>L. ${tG.toLocaleString()}</span></div>`;
    document.getElementById('res_total').innerText = "TOTAL: L. " + (tI+tM+tG).toLocaleString();
}

actualizarSelects();
</script>
</body>
</html>
