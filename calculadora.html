<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estilo Fusion - Ingeniería Pro</title>

<style>
:root { --dorado:#b08d57; --negro:#1a1a1a; --gris:#f4f4f4; }
body { font-family:'Segoe UI', sans-serif; background:var(--gris); margin:0; padding:10px; padding-bottom:100px; }
nav { background:var(--negro); padding:15px; text-align:center; color:var(--dorado); font-weight:bold; border-bottom:3px solid var(--dorado); margin:-10px -10px 15px -10px; }
.tabs { display:flex; gap:4px; margin-bottom:10px; }
.tab { flex:1; padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; font-size:10px; background:#ccc; }
.tab.active { background:var(--dorado); color:white; }
.card { background:white; padding:15px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); margin-bottom:15px; display:none; }
.card.active { display:block; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.full { grid-column:span 2; }
input, select { width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; }
.lista-item { background:white; border-left:5px solid var(--dorado); padding:10px; margin-bottom:8px; }
</style>
</head>

<body>

<nav>Estilo Fusion</nav>

<div class="tabs">
<button class="tab active" onclick="openTab(event,'proyectos')">PROYECTOS</button>
<button class="tab" onclick="openTab(event,'pvc')">PVC</button>
<button class="tab" onclick="openTab(event,'inventario')">BASE DE DATOS</button>
</div>

<div id="proyectos" class="card active">
<div class="grid">

<input id="p_desc" class="full">
<input id="p_ancho" type="number" value="40">
<input id="p_alto" type="number" value="40">

<select id="sel_marco" class="full"></select>
<input id="p_grosor" value="1.5">
<select id="p_unit_m"><option value="20">20</option><option value="30">30</option></select>

<select id="sel_barrote" class="full"></select>
<input id="p_sep" value="5">
<select id="p_unit_b"><option value="30">30</option><option value="20">20</option></select>

<select id="sel_cons" class="full"></select>
<input id="cons_cant" value="1">
<button onclick="sumarConsumible()">+</button>
<div id="lista_badges_cons"></div>

<input id="p_mo">
<input id="p_gan" value="30">
<input id="p_meta" value="1">

</div>
<button onclick="agregarAlProyecto()">AÑADIR</button>
</div>

<div id="pvc" class="card">
<div class="grid">

<input id="pv_desc" class="full">
<input id="pv_ancho">
<input id="pv_alto">

<select id="pv_marco" class="full"></select>
<select id="pv_hoja" class="full"></select>

<select id="pv_cons" class="full"></select>
<input id="pv_cant" value="1">
<button onclick="sumarConsumiblePVC()">+</button>
<div id="pv_badges"></div>

<input id="pv_mo">
<input id="pv_gan">

</div>
<button onclick="agregarPVC()">AÑADIR PVC</button>
</div>

<div id="inventario" class="card">
<input id="db_n">
<input id="db_p">
<button onclick="guardarDB()">Guardar</button>
</div>

<div id="lista_proyecto_visual"></div>
<div id="gran_total"></div>

<script>

let db = JSON.parse(localStorage.getItem('fusion_db'))||[];
let proyecto=[], carritoConsumibles=[], carritoPVC=[];

function openTab(e,n){
document.querySelectorAll('.card').forEach(x=>x.style.display='none');
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
document.getElementById(n).style.display='block';
e.currentTarget.classList.add('active');
}

function guardarDB(){
let n=document.getElementById('db_n').value;
let p=parseFloat(document.getElementById('db_p').value);
if(!n||isNaN(p))return;
db.push({id:Date.now(),n,p});
localStorage.setItem('fusion_db',JSON.stringify(db));
actualizarSelects();
}

function actualizarSelects(){
['sel_marco','sel_barrote','sel_cons','pv_marco','pv_hoja','pv_cons'].forEach(id=>{
let s=document.getElementById(id);
if(!s)return;
s.innerHTML='<option value="">--</option>';
db.forEach(m=>s.innerHTML+=`<option value="${m.id}">${m.n}</option>`);
});
}

/* ✔ FIX INSUMOS */
function sumarConsumible(){
let id=document.getElementById('sel_cons').value;
let cant=parseFloat(document.getElementById('cons_cant').value)||1;
let m=db.find(x=>x.id==id);
if(m){carritoConsumibles.push({...m,c:cant});renderBadges();}
}

function renderBadges(){
let c=document.getElementById('lista_badges_cons'); c.innerHTML="";
carritoConsumibles.forEach(x=>c.innerHTML+=`${x.c}x ${x.n} `);
}

function sumarConsumiblePVC(){
let id=document.getElementById('pv_cons').value;
let cant=parseFloat(document.getElementById('pv_cant').value)||1;
let m=db.find(x=>x.id==id);
if(m){carritoPVC.push({...m,c:cant});renderPVC();}
}

function renderPVC(){
let c=document.getElementById('pv_badges'); c.innerHTML="";
carritoPVC.forEach(x=>c.innerHTML+=`${x.c}x ${x.n} `);
}

/* ✔ FIX CALCULO */
function agregarAlProyecto(){

const m=db.find(x=>x.id==document.getElementById('sel_marco').value);
const b=db.find(x=>x.id==document.getElementById('sel_barrote').value);

if(!m) return alert("Selecciona marco");

let a=parseFloat(p_ancho.value);
let h=parseFloat(p_alto.value);
let gr=parseFloat(p_grosor.value);
let sep=parseFloat(p_sep.value);

let nEsp=Math.round(a/sep);
let cantB=nEsp-1;
let corteB=h-(gr*2);

proyecto.push({
desc:p_desc.value||"pieza",
mo:parseFloat(p_mo.value)||0,
gan:parseFloat(p_gan.value)||0,
mats:[
{p:m.p,u:parseFloat(p_unit_m.value),pies:((a*2)+(h*2))/12},
{p:b?b.p:0,u:parseFloat(p_unit_b.value),pies:(corteB*cantB)/12}
],
cons:[...carritoConsumibles]
});

carritoConsumibles=[];
renderBadges();
renderProyecto();
}

function renderProyecto(){

let total=0;
let l=document.getElementById('lista_proyecto_visual');
l.innerHTML="";

proyecto.forEach(p=>{
let costo=0;

p.mats.forEach(m=>{
let perfiles=Math.ceil(m.pies/m.u);
costo+=perfiles*m.p;
});

p.cons.forEach(c=>costo+=c.p*c.c);

costo+=p.mo;

let venta=costo+(costo*(p.gan/100));
total+=venta;

l.innerHTML+=`<div class="lista-item">${p.desc} - L.${venta.toFixed(2)}</div>`;
});

document.getElementById('gran_total').innerText="TOTAL: L."+total.toFixed(2);
}

function agregarPVC(){

const m=db.find(x=>x.id==document.getElementById('pv_marco').value);
if(!m) return;

let a=parseFloat(pv_ancho.value);
let h=parseFloat(pv_alto.value);

proyecto.push({
desc:pv_desc.value||"PVC",
mo:parseFloat(pv_mo.value)||0,
gan:parseFloat(pv_gan.value)||0,
mats:[{p:m.p,u:20,pies:((a*2)+(h*2))/12}],
cons:[...carritoPVC]
});

carritoPVC=[];
renderPVC();
renderProyecto();
}

actualizarSelects();

</script>

</body>
</html>
