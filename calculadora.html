<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FyC Solution - Calculadora</title>
<style>
body { font-family: Arial; padding: 15px; background:#0f172a; color:white; }
h1 { font-size: 20px; }
input, select, button {
  width: 100%; margin: 5px 0; padding: 10px;
  border-radius: 8px; border: none;
}
button { background:#22c55e; color:black; font-weight:bold; }
.card { background:#1e293b; padding:15px; border-radius:10px; margin-top:10px; }
</style>
</head>

<body>

<h1>🔷 FyC Solution<br>Estilo Fusión</h1>

<div class="card">
<h3>Agregar Verja</h3>

<input id="ancho" placeholder="Ancho (cm)">
<input id="alto" placeholder="Alto (cm)">
<input id="sep" placeholder="Separación barrotes (cm)">

<select id="tubo">
<option value="250">Tubo 1x1</option>
<option value="400">Tubo 2x1</option>
</select>

<button onclick="agregar()">Agregar</button>
</div>

<div class="card">
<h3>Proyecto</h3>
<p id="lista"></p>
<p id="total"></p>
<p id="promedio"></p>
</div>

<script>
let verjas = [];

function agregar(){
 let ancho = parseFloat(document.getElementById("ancho").value);
 let alto = parseFloat(document.getElementById("alto").value);
 let sep = parseFloat(document.getElementById("sep").value);
 let precioTubo = parseFloat(document.getElementById("tubo").value);

 if(!ancho || !alto || !sep){
   alert("Completá los datos");
   return;
 }

 let barrotes = Math.round(ancho/sep)+1;
 let tuboTotal = (2*ancho + 2*alto)/600;
 let costoTubo = Math.ceil(tuboTotal) * precioTubo;

 let varillaTotal = (barrotes*(alto-10))/914;
 let costoVarilla = Math.ceil(varillaTotal)*300;

 let costo = costoTubo + costoVarilla + 800;
 let precio = costo * 1.7;

 verjas.push(precio);

 mostrar();
}

function mostrar(){
 let lista = "";
 let total = 0;

 verjas.forEach((v,i)=>{
   lista += "Verja "+(i+1)+": L "+v.toFixed(0)+"<br>";
   total += v;
 });

 document.getElementById("lista").innerHTML = lista;
 document.getElementById("total").innerHTML = "TOTAL: L "+total.toFixed(0);

 let prom = total / verjas.length;
 document.getElementById("promedio").innerHTML = "PROMEDIO: L "+prom.toFixed(0);
}
</script>

</body>
</html>
