<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cálculo P y V</title>

<style>

:root{
--dorado:#b08d57;
--negro:#1a1a1a;
--gris:#f4f4f4;
}

body{
font-family:'Segoe UI',sans-serif;
background:var(--gris);
margin:0;
padding:10px;
padding-bottom:100px;
}

nav{
background:var(--negro);
padding:15px;
text-align:center;
color:var(--dorado);
font-weight:bold;
border-bottom:3px solid var(--dorado);
margin:-10px -10px 15px -10px;
text-transform:uppercase;
}

.tabs{
display:flex;
gap:4px;
margin-bottom:10px;
}

.tab{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
font-size:10px;
background:#ccc;
}

.tab.active{
background:var(--dorado);
color:white;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:15px;
display:none;
}

.card.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.full{
grid-column:span 2;
}

label{
display:block;
font-size:9px;
font-weight:bold;
color:#666;
margin-bottom:2px;
text-transform:uppercase;
}

input,select{
width:100%;
padding:8px;
border:1px solid #ccc;
border-radius:6px;
font-size:13px;
}

.btn-add{
width:100%;
padding:15px;
background:var(--negro);
color:var(--dorado);
border:2px solid var(--dorado);
border-radius:10px;
font-weight:bold;
margin-top:15px;
cursor:pointer;
}

.btn-plus{
background:var(--dorado);
color:white;
border:none;
padding:8px;
border-radius:6px;
font-weight:bold;
min-width:45px;
}

.lista-item{
background:white;
border-left:5px solid var(--dorado);
padding:12px;
margin-bottom:8px;
border-radius:10px;
position:relative;
font-size:12px;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.btn-del{
position:absolute;
right:10px;
top:10px;
background:#ff4444;
color:white;
border:none;
padding:4px 8px;
border-radius:5px;
font-size:10px;
}

.resumen{
background:#222;
color:white;
padding:15px;
border-radius:12px;
margin-top:10px;
line-height:1.8;
}

.badge{
background:#333;
color:var(--dorado);
padding:4px 8px;
border-radius:4px;
margin-right:4px;
font-size:10px;
display:inline-block;
margin-top:5px;
}

</style>

</head>

<body>

<nav>CÁLCULO P y V</nav>

<div class="tabs">

<button class="tab active"
onclick="openTab(event,'proyectos')">
PROYECTOS
</button>

<button class="tab"
onclick="openTab(event,'inventario')">
INSUMOS
</button>

</div>

<div id="proyectos" class="card active">

<div class="grid">

<div class="full">
<label>Descripción</label>
<input type="text" id="p_desc">
</div>

<div class="full">
<label>Tipo</label>
<select id="p_tipo">

<option value="corrediza">
Ventana / Puerta Corrediza
</option>

<option value="fija">
Ventana Fija
</option>

</select>
</div>

<div>
<label>Ancho (Pulg)</label>
<input type="number" id="p_ancho" value="40">
</div>

<div>
<label>Alto (Pulg)</label>
<input type="number" id="p_alto" value="40">
</div>

<div>
<label>Largo Perfil</label>
<select id="perfil_largo">
<option value="240">20 pies</option>
<option value="360">30 pies</option>
</select>
</div>

<div>
<label>Cantidad</label>
<input type="number" id="p_cantidad" value="1">
</div>

<div class="full"
style="background:#f9f9f9;padding:10px;border-radius:8px;border:1px dashed var(--dorado);">

<label>Carrito de Insumos</label>

<div style="display:flex;gap:5px;">

<select id="sel_cons" style="flex:2;"></select>

<input type="number"
id="cons_cant"
value="1"
style="flex:1;">

<button class="btn-plus"
onclick="sumarConsumible()">
+
</button>

</div>

<div id="lista_badges_cons"></div>

</div>

</div>

<button class="btn-add"
onclick="agregarProyecto()">

+ AGREGAR PROYECTO

</button>

</div>

<div id="inventario" class="card">

<div class="grid">

<div class="full">
<label>Nombre Insumo</label>
<input type="text" id="db_n">
</div>

</div>

<button onclick="guardarDB()"
class="btn-add">

GUARDAR INSUMO

</button>

<hr>

<div id="db_lista_visual"></div>

</div>

<div id="lista_proyecto_visual"></div>

<script>

let db = JSON.parse(localStorage.getItem('fusion_db')) || [];

let carritoConsumibles = [];

let sobrantesMarco = [];
let sobrantesHoja = [];
let sobrantesBatiente = [];
let sobrantesMosq = [];

function openTab(e,n){

document.querySelectorAll('.card').forEach(x=>{
x.style.display='none';
});

document.querySelectorAll('.tab').forEach(x=>{
x.classList.remove('active');
});

document.getElementById(n).style.display='block';

e.currentTarget.classList.add('active');

}

function guardarDB(){

const n = document.getElementById('db_n').value;

if(!n) return;

db.push({
id:Date.now(),
n
});

localStorage.setItem('fusion_db',JSON.stringify(db));

document.getElementById('db_n').value='';

actualizarSelects();

}

function actualizarSelects(){

const s = document.getElementById('sel_cons');

s.innerHTML =
'<option value="">--Seleccionar--</option>';

db.forEach(m=>{

s.innerHTML += `
<option value="${m.id}">
${m.n}
</option>
`;

});

const l = document.getElementById('db_lista_visual');

l.innerHTML='';

db.forEach((m,i)=>{

l.innerHTML += `
<div class="lista-item">

${m.n}

<button class="btn-del"

onclick="
db.splice(${i},1);
localStorage.setItem('fusion_db',JSON.stringify(db));
actualizarSelects();
">

X

</button>

</div>
`;

});

}

function sumarConsumible(){

const id = document.getElementById('sel_cons').value;

const m = db.find(x=>x.id == id);

if(m){

carritoConsumibles.push({

...m,

c:parseFloat(
document.getElementById('cons_cant').value
)||1

});

renderBadges();

}

}

function eliminarConsumible(i){

carritoConsumibles.splice(i,1);

renderBadges();

}

function renderBadges(){

const c = document.getElementById('lista_badges_cons');

c.innerHTML='';

carritoConsumibles.forEach((x,i)=>{

c.innerHTML += `
<span class="badge">

${x.c}x ${x.n}

<button

onclick="eliminarConsumible(${i})"

style="
margin-left:5px;
background:red;
color:white;
border:none;
border-radius:3px;
cursor:pointer;
">

x

</button>

</span>
`;

});

}

function optimizar(lista,pieza,largo){

for(let i=0;i<lista.length;i++){

if(lista[i] >= pieza){

lista[i] -= pieza;

return false;

}

}

lista.push(largo - pieza);

return true;

}

function agregarProyecto(){

const tipo =
document.getElementById('p_tipo').value;

const ancho =
parseFloat(document.getElementById('p_ancho').value);

const alto =
parseFloat(document.getElementById('p_alto').value);

const cantidad =
parseFloat(document.getElementById('p_cantidad').value);

const largoPerfil =
parseFloat(document.getElementById('perfil_largo').value);

let html='';

let barrasMarco = 0;
let barrasHoja = 0;
let barrasBatiente = 0;
let barrasMosq = 0;

if(tipo == 'corrediza'){

for(let z=0; z<cantidad; z++){

const interiorA =
ancho - (1.75 * 2);

const interiorH =
alto - (1.75 * 2);

const hojaA =
(interiorA / 2) + 1.69;

const hojaH =
interiorH + 0.79;

const vidrioA =
hojaA - (1.75 * 2);

const vidrioH =
hojaH - (1.75 * 2);

const piezasMarco = [
ancho,ancho,alto,alto
];

const piezasHoja = [
hojaA,hojaA,hojaH,hojaH,
hojaA,hojaA,hojaH,hojaH
];

const piezasBatiente = [
hojaA,hojaA,hojaH,hojaH,
hojaA,hojaA,hojaH,hojaH
];

const piezasMosq = [
hojaA,hojaA,hojaH,hojaH
];

piezasMarco.forEach(p=>{

if(optimizar(sobrantesMarco,p,largoPerfil)){
barrasMarco++;
}

});

piezasHoja.forEach(p=>{

if(optimizar(sobrantesHoja,p,largoPerfil)){
barrasHoja++;
}

});

piezasBatiente.forEach(p=>{

if(optimizar(sobrantesBatiente,p,largoPerfil)){
barrasBatiente++;
}

});

piezasMosq.forEach(p=>{

if(optimizar(sobrantesMosq,p,largoPerfil)){
barrasMosq++;
}

});

html += `

<div class="resumen">

<b>TIPO:</b> Corrediza<br><br>

<b>HOJAS:</b><br>

2 hojas de
${hojaA.toFixed(2)}
x
${hojaH.toFixed(2)}
pulg<br><br>

<b>VIDRIO:</b><br>

${vidrioA.toFixed(2)}
x
${vidrioH.toFixed(2)}
pulg<br><br>

<b>MARCO:</b><br>

${(((ancho*2)+(alto*2))/12).toFixed(2)}
ft<br>

Barras:
${barrasMarco}<br><br>

<b>PERFIL HOJA:</b><br>

${((((hojaA*2)+(hojaH*2))/12)*2).toFixed(2)}
ft<br>

Barras:
${barrasHoja}<br><br>

<b>BATIENTE:</b><br>

${((((hojaA*2)+(hojaH*2))/12)*2).toFixed(2)}
ft<br>

Barras:
${barrasBatiente}<br><br>

<b>MOSQUITERA:</b><br>

${((((hojaA*2)+(hojaH*2))/12)).toFixed(2)}
ft<br>

Barras:
${barrasMosq}<br><br>

<b>INSUMOS:</b><br>

${carritoConsumibles
.map(x=>`${x.c}x ${x.n}`)
.join('<br>')}

</div>

`;

}

}

if(tipo == 'fija'){

for(let z=0; z<cantidad; z++){

const vidrioA =
ancho - (1.25 * 2);

const vidrioH =
alto - (1.25 * 2);

const piezasMarco = [
ancho,ancho,alto,alto
];

const piezasBatiente = [
ancho,ancho,alto,alto
];

piezasMarco.forEach(p=>{

if(optimizar(sobrantesMarco,p,largoPerfil)){
barrasMarco++;
}

});

piezasBatiente.forEach(p=>{

if(optimizar(sobrantesBatiente,p,largoPerfil)){
barrasBatiente++;
}

});

html += `

<div class="resumen">

<b>TIPO:</b> Ventana Fija<br><br>

<b>VIDRIO:</b><br>

${vidrioA.toFixed(2)}
x
${vidrioH.toFixed(2)}
pulg<br><br>

<b>MARCO:</b><br>

${(((ancho*2)+(alto*2))/12).toFixed(2)}
ft<br>

Barras:
${barrasMarco}<br><br>

<b>BATIENTE:</b><br>

${(((ancho*2)+(alto*2))/12).toFixed(2)}
ft<br>

Barras:
${barrasBatiente}<br><br>

<b>INSUMOS:</b><br>

${carritoConsumibles
.map(x=>`${x.c}x ${x.n}`)
.join('<br>')}

</div>

`;

}

}

document.getElementById(
'lista_proyecto_visual'
).innerHTML += `

<div class="lista-item">

<strong>

${document.getElementById('p_desc').value || 'Proyecto'}

</strong>

${html}

</div>

`;

carritoConsumibles = [];

renderBadges();

}

actualizarSelects();

</script>

</body>
</html>
