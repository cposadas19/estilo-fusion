<script>

let db =
JSON.parse(localStorage.getItem('fusion_db')) || [];

let carritoConsumibles = [];

let proyectos = [];

function openTab(e,n){

document.querySelectorAll('.card').forEach(x=>{
x.style.display='none';
});

document.querySelectorAll('.tab').forEach(x=>{
x.classList.remove('active');
});

document.getElementById(n).style.display='block';

e.currentTarget.classList.add('active');

}

function guardarDB(){

const n =
document.getElementById('db_n').value;

if(!n) return;

db.push({
id:Date.now(),
n
});

localStorage.setItem(
'fusion_db',
JSON.stringify(db)
);

document.getElementById('db_n').value='';

actualizarSelects();

}

function actualizarSelects(){

const s =
document.getElementById('sel_cons');

s.innerHTML =
'<option value="">--Seleccionar--</option>';

db.forEach(m=>{

s.innerHTML += `
<option value="${m.id}">
${m.n}
</option>
`;

});

const l =
document.getElementById('db_lista_visual');

l.innerHTML='';

db.forEach((m,i)=>{

l.innerHTML += `

<div class="lista-item">

${m.n}

<button class="btn-del"

onclick="
db.splice(${i},1);
localStorage.setItem(
'fusion_db',
JSON.stringify(db)
);
actualizarSelects();
">

X

</button>

</div>
`;

});

}

function sumarConsumible(){

const id =
document.getElementById('sel_cons').value;

const m =
db.find(x=>x.id == id);

if(m){

carritoConsumibles.push({

...m,

c:parseFloat(
document.getElementById('cons_cant').value
)||1

});

renderBadges();

}

}

function eliminarConsumible(i){

carritoConsumibles.splice(i,1);

renderBadges();

}

function renderBadges(){

const c =
document.getElementById('lista_badges_cons');

c.innerHTML='';

carritoConsumibles.forEach((x,i)=>{

c.innerHTML += `

<span class="badge">

${x.c}x ${x.n}

<button

onclick="eliminarConsumible(${i})"

style="
margin-left:5px;
background:red;
color:white;
border:none;
border-radius:3px;
cursor:pointer;
">

x

</button>

</span>
`;

});

}

function agregarProyecto(){

const descripcion =
document.getElementById('p_desc').value.trim();

if(!descripcion){

alert(
'Debes escribir descripción. Ejemplo: Puerta sala o Ventana cocina'
);

return;

}

const tipo =
document.getElementById('p_tipo').value;

const ancho =
parseFloat(document.getElementById('p_ancho').value);

const alto =
parseFloat(document.getElementById('p_alto').value);

const cantidad =
parseFloat(document.getElementById('p_cantidad').value);

const largoPerfil =
parseFloat(document.getElementById('perfil_largo').value);

for(let i=0;i<cantidad;i++){

proyectos.push({

desc: descripcion,

tipo,
ancho,
alto,
largoPerfil,

insumos:[...carritoConsumibles]

});

}

carritoConsumibles = [];

renderBadges();

renderProyecto();

}

function eliminarProyecto(i){

proyectos.splice(i,1);

renderProyecto();

}

function optimizarPiezas(piezas,largo){

piezas.sort((a,b)=>b-a);

let barras = [];

piezas.forEach(pieza=>{

let mejorBarra = -1;
let menorSobrante = Infinity;

for(let i=0;i<barras.length;i++){

if(barras[i] >= pieza){

let sobrante = barras[i] - pieza;

if(sobrante < menorSobrante){

menorSobrante = sobrante;
mejorBarra = i;

}

}

}

if(mejorBarra >= 0){

barras[mejorBarra] -= pieza;

}else{

barras.push(largo - pieza);

}

});

return {

cantidad:barras.length,

sobrantes:barras.filter(x=>x>0)

};

}

function renderProyecto(){

const l =
document.getElementById(
'lista_proyecto_visual'
);

l.innerHTML='';

document.getElementById(
'resumen_contenido'
).innerHTML='';

let totalMarco = [];
let totalHoja = [];
let totalBatiente = [];
let totalMosq = [];

let totalVidrioArea = 0;

let vidriosTemplados = [];

proyectos.forEach((p,i)=>{

let html='';

const esPuerta =
p.desc.toLowerCase().includes('puerta');

if(p.tipo == 'corrediza'){

const interiorA =
p.ancho - (1.75 * 2);

const interiorH =
p.alto - (1.75 * 2);

const hojaA =
(interiorA / 2) + 1.69;

const hojaH =
interiorH + 0.79;

const vidrioA =
hojaA - (1.75 * 2);

const vidrioH =
hojaH - (1.75 * 2);

if(esPuerta){

vidriosTemplados.push(
`2 piezas ${vidrioA.toFixed(2)} x ${vidrioH.toFixed(2)}`
);

}else{

totalVidrioArea +=
(vidrioA * vidrioH) * 2;

}

const piezasMarco = [
p.ancho,p.ancho,p.alto,p.alto
];

const piezasHoja = [
hojaA,hojaA,hojaH,hojaH,
hojaA,hojaA,hojaH,hojaH
];

const piezasBatiente = [
hojaA,hojaA,hojaH,hojaH,
hojaA,hojaA,hojaH,hojaH
];

const piezasMosq = [
hojaA,hojaA,hojaH,hojaH
];

totalMarco.push(...piezasMarco);
totalHoja.push(...piezasHoja);
totalBatiente.push(...piezasBatiente);
totalMosq.push(...piezasMosq);

html = `

<div class="resumen">

<b>${p.desc.toUpperCase()}</b><br><br>

<b>TIPO:</b> Corrediza<br><br>

<b>HOJAS:</b><br>

2 hojas de
${hojaA.toFixed(2)}
x
${hojaH.toFixed(2)}<br><br>

<b>VIDRIO:</b><br>

${esPuerta
?
`Vidrio templado<br>
2 piezas de ${vidrioA.toFixed(2)} x ${vidrioH.toFixed(2)}`
:
`2 piezas de ${vidrioA.toFixed(2)} x ${vidrioH.toFixed(2)}`
}

<br><br>

<b>MARCO:</b>
${(((p.ancho*2)+(p.alto*2))/12).toFixed(2)}
ft<br>

<b>HOJA:</b>
${((((hojaA*2)+(hojaH*2))/12)*2).toFixed(2)}
ft<br>

<b>BATIENTE:</b>
${((((hojaA*2)+(hojaH*2))/12)*2).toFixed(2)}
ft<br>

<b>MOSQUITERA:</b>
${((((hojaA*2)+(hojaH*2))/12)).toFixed(2)}
ft<br><br>

<b>INSUMOS:</b><br>

${p.insumos.map(x=>
`${x.c}x ${x.n}`
).join('<br>')}

</div>

`;

}

if(p.tipo == 'fija'){

const vidrioA =
p.ancho - (1.25 * 2);

const vidrioH =
p.alto - (1.25 * 2);

if(esPuerta){

vidriosTemplados.push(
`1 pieza ${vidrioA.toFixed(2)} x ${vidrioH.toFixed(2)}`
);

}else{

totalVidrioArea +=
(vidrioA * vidrioH);

}

const piezasMarco = [
p.ancho,p.ancho,p.alto,p.alto
];

const piezasBatiente = [
p.ancho,p.ancho,p.alto,p.alto
];

totalMarco.push(...piezasMarco);
totalBatiente.push(...piezasBatiente);

html = `

<div class="resumen">

<b>${p.desc.toUpperCase()}</b><br><br>

<b>TIPO:</b> Fija<br><br>

<b>VIDRIO:</b><br>

${esPuerta
?
`Vidrio templado<br>
1 pieza ${vidrioA.toFixed(2)} x ${vidrioH.toFixed(2)}`
:
`1 pieza ${vidrioA.toFixed(2)} x ${vidrioH.toFixed(2)}`
}

<br><br>

<b>MARCO:</b>
${(((p.ancho*2)+(p.alto*2))/12).toFixed(2)}
ft<br>

<b>BATIENTE:</b>
${(((p.ancho*2)+(p.alto*2))/12).toFixed(2)}
ft<br><br>

<b>INSUMOS:</b><br>

${p.insumos.map(x=>
`${x.c}x ${x.n}`
).join('<br>')}

</div>

`;

}

if(p.tipo == 'abatible'){

const vidrioA =
p.ancho - (1.75 * 2);

const vidrioH =
p.alto - (1.75 * 2);

if(esPuerta){

vidriosTemplados.push(
`1 pieza ${vidrioA.toFixed(2)} x ${vidrioH.toFixed(2)}`
);

}else{

totalVidrioArea +=
(vidrioA * vidrioH);

}

const piezasMarco = [
p.ancho,p.ancho,p.alto,p.alto
];

const piezasHoja = [
p.ancho,p.ancho,p.alto,p.alto
];

const piezasBatiente = [
p.ancho,p.ancho,p.alto,p.alto
];

totalMarco.push(...piezasMarco);
totalHoja.push(...piezasHoja);
totalBatiente.push(...piezasBatiente);

html = `

<div class="resumen">

<b>${p.desc.toUpperCase()}</b><br><br>

<b>TIPO:</b> Abatible<br><br>

<b>VIDRIO:</b><br>

${esPuerta
?
`Vidrio templado<br>
1 pieza ${vidrioA.toFixed(2)} x ${vidrioH.toFixed(2)}`
:
`1 pieza ${vidrioA.toFixed(2)} x ${vidrioH.toFixed(2)}`
}

<br><br>

<b>MARCO:</b>
${(((p.ancho*2)+(p.alto*2))/12).toFixed(2)}
ft<br>

<b>HOJA:</b>
${(((p.ancho*2)+(p.alto*2))/12).toFixed(2)}
ft<br>

<b>BATIENTE:</b>
${(((p.ancho*2)+(p.alto*2))/12).toFixed(2)}
ft<br><br>

<b>INSUMOS:</b><br>

${p.insumos.map(x=>
`${x.c}x ${x.n}`
).join('<br>')}

</div>

`;

}

l.innerHTML += `

<div class="lista-item">

<button class="btn-del"
onclick="eliminarProyecto(${i})">
X
</button>

${html}

</div>
`;

});

if(proyectos.length > 0){

document.getElementById(
'resumen_general'
).style.display='block';

const largo =
proyectos[0].largoPerfil;

const marcoOpt =
optimizarPiezas(totalMarco,largo);

const hojaOpt =
optimizarPiezas(totalHoja,largo);

const batiOpt =
optimizarPiezas(totalBatiente,largo);

const mosqOpt =
optimizarPiezas(totalMosq,largo);

const areaLamina = 48;

const laminasVidrio =
Math.ceil((totalVidrioArea/144) / areaLamina);

document.getElementById(
'resumen_contenido'
).innerHTML = `

<b>MARCO</b><br>
Barras:
${marcoOpt.cantidad}<br><br>

<b>HOJA</b><br>
Barras:
${hojaOpt.cantidad}<br><br>

<b>BATIENTE</b><br>
Barras:
${batiOpt.cantidad}<br><br>

<b>MOSQUITERA</b><br>
Barras:
${mosqOpt.cantidad}<br><br>

${totalVidrioArea > 0 ? `

<b>VIDRIO NORMAL</b><br>

Área:
${(totalVidrioArea/144).toFixed(2)}
ft²<br>

Láminas 6x8:
${laminasVidrio}

<br><br>

` : ''}

${vidriosTemplados.length > 0 ? `

<b>VIDRIO TEMPLADO</b><br>

${vidriosTemplados.join('<br>')}

` : ''}

`;

}else{

document.getElementById(
'resumen_general'
).style.display='none';

}

}

actualizarSelects();

</script>
